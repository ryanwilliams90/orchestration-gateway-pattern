name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt in to the Node.js 24 runtime for JavaScript actions ahead of the
# 2026-09 deprecation deadline. Removes the GitHub-side warning on every
# run and surfaces any incompatibilities before the forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint
        run: ruff check src tests

      - name: Format
        run: ruff format --check src tests

      - name: Type check
        run: mypy src

      - name: Test
        run: PYTHONPATH=src pytest -q
